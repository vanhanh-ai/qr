<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR-UID Maintenance | Premium Asset Management</title>
    
    <!-- Google Fonts & Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    
    <script src="https://unpkg.com/html5-qrcode"></script>

    <style>
        :root {
            --glass-bg: rgba(255, 255, 255, 0.95);
            --primary-grad: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            --accent-color: #00d2ff;
        }

        body {
            background: #f0f2f5;
            font-family: 'Inter', sans-serif;
            color: #2d3436;
            min-height: 100vh;
        }

        .app-shell {
            max-width: 480px;
            margin: 0 auto;
            padding: 20px;
        }

        .header-section {
            padding: 30px 0;
            text-align: center;
        }

        .logo-box {
            background: var(--primary-grad);
            width: 60px;
            height: 60px;
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 15px;
            box-shadow: 0 10px 20px rgba(30, 60, 114, 0.2);
        }

        .logo-box i { font-size: 28px; color: white; }

        .card-premium {
            background: var(--glass-bg);
            border-radius: 24px;
            border: 1px solid rgba(255,255,255,0.3);
            box-shadow: 0 20px 40px rgba(0,0,0,0.05);
            overflow: hidden;
            margin-bottom: 25px;
            transition: all 0.3s ease;
        }

        #reader {
            width: 100%;
            border-radius: 0;
            display: none;
            border-bottom: 3px solid var(--accent-color);
        }

        .btn-scan-main {
            background: var(--primary-grad);
            color: white;
            border: none;
            padding: 20px;
            border-radius: 18px;
            font-weight: 800;
            letter-spacing: 0.5px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            box-shadow: 0 15px 30px rgba(30, 60, 114, 0.15);
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .btn-scan-main:active { transform: scale(0.95); }

        .info-header {
            background: #f8fafc;
            padding: 20px;
            border-bottom: 1px solid #edf2f7;
        }

        .checklist-item {
            padding: 18px 20px;
            display: flex;
            align-items: center;
            gap: 15px;
            border-bottom: 1px solid #f1f5f9;
            cursor: pointer;
        }

        .checklist-item:last-child { border-bottom: none; }

        .form-check-input {
            width: 24px;
            height: 24px;
            border-radius: 8px;
            border: 2px solid #cbd5e1;
        }

        .form-check-input:checked {
            background-color: #10b981;
            border-color: #10b981;
        }

        .btn-submit {
            background: #10b981;
            color: white;
            border: none;
            padding: 20px;
            border-radius: 50px;
            font-weight: 800;
            width: 100%;
            box-shadow: 0 10px 20px rgba(16, 185, 129, 0.2);
            margin-top: 10px;
        }

        .loading-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(255,255,255,0.8);
            backdrop-filter: blur(5px);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
    </style>
</head>
<body>

<div class="loading-overlay" id="loader">
    <div class="spinner-border text-primary" role="status"></div>
</div>

<div class="app-shell">
    <div class="header-section">
        <div class="d-flex justify-content-end px-3">
            <div class="btn-group btn-group-sm bg-white rounded-pill shadow-sm p-1">
                <button class="btn btn-outline-primary border-0 rounded-pill px-3" onclick="setLanguage('vi')" id="btn-vi">VN</button>
                <button class="btn btn-outline-primary border-0 rounded-pill px-3" onclick="setLanguage('en')" id="btn-en">EN</button>
            </div>
        </div>
        <div class="logo-box">
            <i class="bi bi-cpu"></i>
        </div>
        <h2 class="fw-800 m-0 text-dark" data-i18n="app_title">UID QR Master</h2>
        <p class="text-muted small mt-1" data-i18n="app_subtitle">Smart Equipment Management</p>
    </div>

    <div id="reader"></div>

    <div class="card-premium p-3 mb-4 animate__animated animate__fadeIn">
        <button class="btn-scan-main w-100" id="startScan" data-i18n="btn_scan">
            <i class="bi bi-qr-code-scan"></i> SCAN EQUIPMENT
        </button>
        
        <div class="mt-3 pt-3 border-top d-flex gap-2">
            <input type="text" id="manual_uid" class="form-control border-0 bg-light p-3" style="border-radius: 14px;" placeholder="Or enter UID manually..." data-i18n-placeholder="placeholder_uid">
            <button class="btn btn-primary px-4" style="border-radius: 14px;" onclick="handleManualEntry()" data-i18n="btn_go">GO</button>
        </div>
    </div>

    <div id="infoSection" style="display: none;">
        <div class="card-premium animate__animated animate__fadeInUp">
            <div class="info-header">
                <div class="d-flex justify-content-between">
                    <span class="badge bg-primary-subtle text-primary px-3 py-2 rounded-pill" data-i18n="badge_active">Active Device</span>
                    <span class="text-muted small" id="curr_time"></span>
                </div>
                <h4 class="fw-bold mt-3 mb-1" id="disp_name">Loading...</h4>
                <div class="d-flex gap-3 mt-2">
                    <span class="small text-muted"><i class="bi bi-hash me-1"></i><span id="disp_uid">---</span></span>
                    <span class="small text-muted"><i class="bi bi-geo-alt me-1"></i><span id="disp_loc">---</span></span>
                </div>
            </div>

            <div class="card-body p-0">
                <div class="p-3 bg-light-subtle">
                    <span class="fw-bold small text-uppercase text-secondary" style="letter-spacing: 1px;" data-i18n="checklist_title">Maintenance Checklist</span>
                </div>
                
                <div class="checklist-item" onclick="toggleCheck('item1')">
                    <input class="form-check-input" type="checkbox" id="item1">
                    <div>
                        <div class="fw-bold" data-i18n="check1_title">Power & Battery</div>
                        <div class="small text-muted" data-i18n="check1_desc">Check voltage and connections</div>
                    </div>
                </div>

                <div class="checklist-item" onclick="toggleCheck('item2')">
                    <input class="form-check-input" type="checkbox" id="item2">
                    <div>
                        <div class="fw-bold" data-i18n="check2_title">Mechanical Vibration</div>
                        <div class="small text-muted" data-i18n="check2_desc">Monitor noise and heat</div>
                    </div>
                </div>

                <div class="checklist-item" onclick="toggleCheck('item3')">
                    <input class="form-check-input" type="checkbox" id="item3">
                    <div>
                        <div class="fw-bold" data-i18n="check3_title">Clean & Lubricate</div>
                        <div class="small text-muted" data-i18n="check3_desc">Remove dust and apply grease</div>
                    </div>
                </div>

                <div class="p-4 border-top">
                    <label class="fw-bold small text-secondary mb-2" data-i18n="field_notes">FIELD NOTES</label>
                    <textarea class="form-control border-0 bg-light p-3" id="notes" rows="3" style="border-radius: 12px;" placeholder="Add technical observations..." data-i18n-placeholder="placeholder_notes"></textarea>
                </div>
            </div>
        </div>

        <button class="btn-submit" onclick="submitData()" data-i18n="btn_complete">
            COMPLETE INSPECTION <i class="bi bi-check-circle ms-2"></i>
        </button>
    </div>
</div>

<script>
    const scanner = new Html5Qrcode("reader");
    const startBtn = document.getElementById('startScan');
    let gasUrl = 'https://script.google.com/macros/s/YOUR_GAS_ID/exec'; 
    const API_TOKEN = 'HAPU_QR_SECRET_2026';

    const translations = {
        vi: {
            app_title: "Hệ thống UID-QR",
            app_subtitle: "Quản lý bảo trì thiết bị thông minh",
            btn_scan: "QUÉT MÃ THIẾT BỊ",
            placeholder_uid: "Hoặc nhập UID bằng tay...",
            btn_go: "GỬI",
            badge_active: "Thiết bị đang chạy",
            checklist_title: "DANH MỤC KIỂM TRA",
            check1_title: "Nguồn & Pin",
            check1_desc: "Kiểm tra điện áp và kết nối",
            check2_title: "Rung động cơ học",
            check2_desc: "Theo dõi tiếng ồn và nhiệt độ",
            check3_title: "Vệ sinh & Bôi trơn",
            check3_desc: "Làm sạch bụi và tra mỡ",
            field_notes: "GHI CHÚ KỸ THUẬT",
            placeholder_notes: "Nhập quan sát thực tế...",
            btn_complete: "XÁC NHẬN HOÀN TẤT",
            scan_another: "QUÉT THIẾT BỊ KHÁC",
            alert_invalid_uid: "Vui lòng nhập UID hợp lệ",
            alert_conn_error: "Lỗi kết nối",
            alert_success: "Thành công! Nhật ký bảo trì của {uid} đã được lưu."
        },
        en: {
            app_title: "UID QR Master",
            app_subtitle: "Smart Equipment Management",
            btn_scan: "SCAN EQUIPMENT",
            placeholder_uid: "Or enter UID manually...",
            btn_go: "GO",
            badge_active: "Active Device",
            checklist_title: "Maintenance Checklist",
            check1_title: "Power & Battery",
            check1_desc: "Check voltage and connections",
            check2_title: "Mechanical Vibration",
            check2_desc: "Monitor noise and heat",
            check3_title: "Clean & Lubricate",
            check3_desc: "Remove dust and apply grease",
            field_notes: "FIELD NOTES",
            placeholder_notes: "Add technical observations...",
            btn_complete: "COMPLETE INSPECTION",
            scan_another: "SCAN ANOTHER",
            alert_invalid_uid: "Please enter a valid UID",
            alert_conn_error: "Connection error",
            alert_success: "Success! Maintenance record for {uid} saved."
        }
    };

    let currentLang = localStorage.getItem('lang') || 'vi';

    function setLanguage(lang) {
        currentLang = lang;
        localStorage.setItem('lang', lang);
        document.querySelectorAll('[data-i18n]').forEach(el => {
            const key = el.getAttribute('data-i18n');
            if (translations[lang][key]) {
                const icon = el.querySelector('i');
                if (icon) {
                    el.innerHTML = '';
                    el.appendChild(icon);
                    el.appendChild(document.createTextNode(' ' + translations[lang][key]));
                } else {
                    el.innerText = translations[lang][key];
                }
            }
        });
        document.querySelectorAll('[data-i18n-placeholder]').forEach(el => {
            const key = el.getAttribute('data-i18n-placeholder');
            if (translations[lang][key]) el.placeholder = translations[lang][key];
        });
        document.getElementById('btn-vi').classList.toggle('btn-primary', lang === 'vi');
        document.getElementById('btn-en').classList.toggle('btn-primary', lang === 'en');
    }
    setLanguage(currentLang);

    function toggleCheck(id) {
        const cb = document.getElementById(id);
        cb.checked = !cb.checked;
    }

    startBtn.addEventListener('click', () => {
        const reader = document.getElementById('reader');
        reader.style.display = 'block';
        scanner.start({ facingMode: "environment" }, { fps: 15, qrbox: {width: 250, height: 250} }, 
        (uid) => {
            document.getElementById('disp_uid').innerText = uid;
            document.getElementById('infoSection').style.display = 'block';
            reader.style.display = 'none';
            startBtn.innerHTML = `<i class="bi bi-arrow-repeat"></i> ${translations[currentLang].scan_another}`;
            scanner.stop();
            fetchData(uid);
        }, (err) => {});
    });

    function handleManualEntry() {
        const uid = document.getElementById('manual_uid').value.trim();
        if (uid) {
            document.getElementById('disp_uid').innerText = uid;
            document.getElementById('infoSection').style.display = 'block';
            startBtn.innerHTML = `<i class="bi bi-arrow-repeat"></i> ${translations[currentLang].scan_another}`;
            fetchData(uid);
        } else {
            alert(translations[currentLang].alert_invalid_uid);
        }
    }

    async function fetchData(uid) {
        document.getElementById('loader').style.display = 'flex';
        try {
            const response = await fetch(`${gasUrl}?uid=${uid}&token=${API_TOKEN}`);
            const result = await response.json();
            if (result.status === "success") {
                document.getElementById('disp_name').innerText = result.data.name;
                document.getElementById('disp_loc').innerText = result.data.location;
            } else {
                document.getElementById('disp_name').innerText = "Unknown Device";
                document.getElementById('disp_loc').innerText = "Not in database";
            }
            document.getElementById('curr_time').innerText = new Date().toLocaleTimeString();
        } catch (e) {
            alert(translations[currentLang].alert_conn_error);
        } finally {
            document.getElementById('loader').style.display = 'none';
        }
    }

    async function submitData() {
        const uid = document.getElementById('disp_uid').innerText;
        const notes = document.getElementById('notes').value;
        const items = {
            item1: document.getElementById('item1').checked,
            item2: document.getElementById('item2').checked,
            item3: document.getElementById('item3').checked
        };
        document.getElementById('loader').style.display = 'flex';
        try {
            await fetch(gasUrl, {
                method: 'POST',
                mode: 'no-cors',
                body: JSON.stringify({ uid, token: API_TOKEN, notes, items })
            });
            alert(translations[currentLang].alert_success.replace('{uid}', uid));
            location.reload();
        } catch (e) {
            alert(translations[currentLang].alert_conn_error);
        } finally {
            document.getElementById('loader').style.display = 'none';
        }
    }
</script>
</body>
</html>
